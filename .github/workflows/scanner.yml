name: Stock Scanner

on:
  schedule:
    - cron: '30 13 * * 1-5'  # Runs Mon-Fri at 6:30 AM PST (market open)
  workflow_dispatch:          # Also allows manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner and signals
        run: python trade.py
        env:
          ACCOUNT_ID: ${{ secrets.IBKR_ACCOUNT_ID }}
